# CronJobs nativos do Kubernetes — alternativa ao Deployment com @nestjs/schedule
#
# Use esta abordagem quando:
#   - O job precisa de recursos diferentes da aplicação principal
#   - O job pode demorar horas e não deve bloquear o processo principal
#   - Você quer garantia de execução única (concurrencyPolicy: Forbid)
#
# Use o Deployment (cron.deployment.yaml) quando:
#   - Os jobs são rápidos (< 1 min) e frequentes (a cada 1-5 min)
#   - Prefere @nestjs/schedule com lógica centralizada no código
#   - Quer evitar cold-start de container a cada execução
#
# Exemplos de jobs da plataforma domestic:
---
# Job: expirar solicitações de serviço pendentes há mais de 24h
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-expire-service-requests
  namespace: domestic
  labels:
    app: cron
    job-type: maintenance
spec:
  schedule: "0 */6 * * *"      # a cada 6 horas
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: cron
            job-type: maintenance
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-secret
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command: [sh, -c, "until nc -z postgres 5432; do sleep 2; done"]
          containers:
            - name: cron
              image: ghcr.io/andersonfrfilho/domestic-cron:main
              imagePullPolicy: Always
              # Comando específico — o container sabe qual job executar pelo argumento
              command: ["node", "dist/jobs/expire-service-requests.js"]
              envFrom:
                - configMapRef:
                    name: cron-config
                - secretRef:
                    name: cron-secret
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
---
# Job: enviar resumo diário de atividades para provedores
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-daily-provider-summary
  namespace: domestic
  labels:
    app: cron
    job-type: notification
spec:
  schedule: "0 8 * * *"        # todo dia às 08:00 UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: cron
            job-type: notification
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-secret
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command: [sh, -c, "until nc -z postgres 5432; do sleep 2; done"]
            - name: wait-for-rabbitmq
              image: busybox:1.36
              command: [sh, -c, "until nc -z rabbitmq 5672; do sleep 2; done"]
          containers:
            - name: cron
              image: ghcr.io/andersonfrfilho/domestic-cron:main
              imagePullPolicy: Always
              command: ["node", "dist/jobs/daily-provider-summary.js"]
              envFrom:
                - configMapRef:
                    name: cron-config
                - secretRef:
                    name: cron-secret
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
---
# Job: limpeza de tokens expirados e sessões antigas
apiVersion: batch/v1
kind: CronJob
metadata:
  name: cron-cleanup-expired-tokens
  namespace: domestic
  labels:
    app: cron
    job-type: maintenance
spec:
  schedule: "30 3 * * *"       # todo dia às 03:30 UTC (após backups)
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: cron
            job-type: maintenance
        spec:
          restartPolicy: OnFailure
          imagePullSecrets:
            - name: ghcr-secret
          initContainers:
            - name: wait-for-redis
              image: busybox:1.36
              command: [sh, -c, "until nc -z redis 6379; do sleep 2; done"]
          containers:
            - name: cron
              image: ghcr.io/andersonfrfilho/domestic-cron:main
              imagePullPolicy: Always
              command: ["node", "dist/jobs/cleanup-expired-tokens.js"]
              envFrom:
                - configMapRef:
                    name: cron-config
                - secretRef:
                    name: cron-secret
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "200m"
