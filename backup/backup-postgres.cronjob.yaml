# Backup Automatizado — PostgreSQL → MinIO
#
# Estratégia adotada por empresas como Shopify, GitHub, e a maioria dos times de médio porte:
#   pg_dump (snapshot lógico) | gzip | mc cp (MinIO/S3)
#
# Retenção: 7 backups diários, 4 semanais, 3 mensais — ajuste conforme SLA.
#
# Para produção, prefira CloudNativePG com Barman (WAL streaming + PITR).
# Este CronJob é a camada de segurança extra (backup lógico exportável).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-postgres-config
  namespace: domestic
  labels:
    app: backup-postgres
data:
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "backups"
  BACKUP_RETENTION_DAYS: "30"
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "backend_database_postgres"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-postgres
  namespace: domestic
  labels:
    app: backup-postgres
spec:
  # Executa todo dia às 02:00 UTC (ajuste para seu fuso horário)
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: backup-postgres
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-postgres
              image: busybox:1.36
              command: [sh, -c, "until nc -z postgres 5432; do sleep 2; done"]
          containers:
            - name: backup
              # postgres:18 já contém pg_dump e curl; mc é instalado no script.
              image: postgres:18
              command:
                - sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  FILENAME="postgres_${POSTGRES_DB}_${DATE}.sql.gz"

                  echo "==> Iniciando backup: ${FILENAME}"

                  # Instala minio client
                  curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc

                  # Configura alias do MinIO
                  mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}" --insecure

                  # Cria bucket se não existir
                  mc mb --ignore-existing minio/${MINIO_BUCKET}/postgres

                  # Faz dump e envia em stream para MinIO (sem tocar no disco do pod)
                  PGPASSWORD="${POSTGRES_PASSWORD}" pg_dump \
                    -h "${POSTGRES_HOST}" \
                    -p "${POSTGRES_PORT}" \
                    -U "${POSTGRES_USER}" \
                    -d "${POSTGRES_DB}" \
                    --no-password \
                    --format=plain \
                    --clean \
                    --if-exists \
                  | gzip \
                  | mc pipe minio/${MINIO_BUCKET}/postgres/${FILENAME}

                  echo "==> Backup concluído: minio/${MINIO_BUCKET}/postgres/${FILENAME}"

                  # Remove backups mais antigos que BACKUP_RETENTION_DAYS dias
                  mc rm --recursive --force --older-than "${BACKUP_RETENTION_DAYS}d" \
                    minio/${MINIO_BUCKET}/postgres/ || true

                  echo "==> Limpeza de retenção concluída (>${BACKUP_RETENTION_DAYS} dias removidos)"
              env:
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-secret
                      key: POSTGRES_PASSWORD
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_PASSWORD
              envFrom:
                - configMapRef:
                    name: backup-postgres-config
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
