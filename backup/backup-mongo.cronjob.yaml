# Backup Automatizado — MongoDB → MinIO
#
# Estratégia: mongodump (BSON comprimido) | mc cp (MinIO/S3)
#
# Para produção com ReplicaSet, o mongodump deve apontar para um secondary
# para não impactar o primary (leitura consistente sem bloquear writes).
# Adicione ?readPreference=secondary na URI quando usar ReplicaSet.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: backup-mongo-config
  namespace: domestic
  labels:
    app: backup-mongo
data:
  MINIO_ENDPOINT: "http://minio:9000"
  MINIO_BUCKET: "backups"
  BACKUP_RETENTION_DAYS: "30"
  MONGO_HOST: "mongo"
  MONGO_PORT: "27017"
  MONGO_DB: "backend_database_mongo"
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup-mongo
  namespace: domestic
  labels:
    app: backup-mongo
spec:
  # 30 minutos depois do postgres (02:30 UTC) para não concorrer por CPU
  schedule: "30 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: backup-mongo
        spec:
          restartPolicy: OnFailure
          initContainers:
            - name: wait-for-mongo
              image: busybox:1.36
              command: [sh, -c, "until nc -z mongo 27017; do sleep 2; done"]
          containers:
            - name: backup
              image: mongo:7
              command:
                - sh
                - -c
                - |
                  set -e
                  DATE=$(date +%Y-%m-%d_%H-%M-%S)
                  FILENAME="mongo_${MONGO_DB}_${DATE}.archive.gz"
                  TMPFILE="/tmp/${FILENAME}"

                  echo "==> Iniciando backup: ${FILENAME}"

                  # Instala minio client
                  curl -sSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
                  chmod +x /usr/local/bin/mc

                  # Configura alias do MinIO
                  mc alias set minio "${MINIO_ENDPOINT}" "${MINIO_ACCESS_KEY}" "${MINIO_SECRET_KEY}" --insecure

                  # Cria bucket se não existir
                  mc mb --ignore-existing minio/${MINIO_BUCKET}/mongo

                  # mongodump em formato archive (stream único), comprimido, enviado para MinIO
                  # Para ReplicaSet: acrescente --readPreference=secondary na URI
                  mongodump \
                    --uri="mongodb://${MONGO_HOST}:${MONGO_PORT}/${MONGO_DB}" \
                    --archive="${TMPFILE}" \
                    --gzip

                  mc cp "${TMPFILE}" minio/${MINIO_BUCKET}/mongo/${FILENAME}
                  rm -f "${TMPFILE}"

                  echo "==> Backup concluído: minio/${MINIO_BUCKET}/mongo/${FILENAME}"

                  # Retenção
                  mc rm --recursive --force --older-than "${BACKUP_RETENTION_DAYS}d" \
                    minio/${MINIO_BUCKET}/mongo/ || true

                  echo "==> Limpeza de retenção concluída (>${BACKUP_RETENTION_DAYS} dias removidos)"
              env:
                - name: MINIO_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_USER
                - name: MINIO_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      name: minio-secret
                      key: MINIO_ROOT_PASSWORD
              envFrom:
                - configMapRef:
                    name: backup-mongo-config
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "256Mi"
                  cpu: "300m"
