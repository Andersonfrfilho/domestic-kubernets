apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: domestic
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  type: ClusterIP
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  namespace: domestic
  labels:
    app: rabbitmq
spec:
  selector:
    app: rabbitmq
  type: NodePort
  ports:
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30672
