apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
  namespace: domestic
  labels:
    app: api
data:
  NODE_ENV: "development"
  NODE_OPTIONS: "--max-old-space-size=512"
  PORT: "3000"
  DATABASE_POSTGRES_HOST: "postgres"
  DATABASE_POSTGRES_PORT: "5432"
  DATABASE_POSTGRES_NAME: "domestic_postgres"
  DATABASE_MONGO_HOST: "mongo"
  MONGO_URI: "mongodb://mongo:27017/domestic_mongo"
  CACHE_REDIS_HOST: "redis"
  CACHE_REDIS_PORT: "6379"
  QUEUE_RABBITMQ_HOST: "rabbitmq"
  QUEUE_RABBITMQ_PORT: "5672"
  QUEUE_RABBITMQ_MANAGEMENT_PORT: "15672"
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  KEYCLOAK_PORT: "8080"
  STORAGE_MINIO_ENDPOINT: "minio"
  STORAGE_MINIO_PORT: "9000"
  # TypeORM flags (from .env.example)
  DATABASE_POSTGRES_SYNCHRONIZE: "false"
  DATABASE_POSTGRES_LOGGING: "false"
  DATABASE_POSTGRES_TIMEZONE: "Z"
  # Keycloak realm / client (from .env.example)
  KEYCLOAK_REALM: "domestic"
  KEYCLOAK_CLIENT_ID: "domestic-api"
  # ─── Observability ──────────────────────────────────────────────────────────
  # OpenTelemetry — tracing distribuído (Jaeger local; substituir para nuvem)
  OTEL_SERVICE_NAME: "domestic-api"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
  # Cloud migration: substituir pelo endpoint do coletor na nuvem, ex:
  #   GCP Cloud Trace:   "https://cloudtrace.googleapis.com"
  #   AWS X-Ray (ADOT):  "http://aws-otel-collector:4318"
  #   Datadog:           "http://datadog-agent:4318"
  #   New Relic:         "https://otlp.nr-data.net:4318"
  OTEL_EXPORTER_OTLP_HEADERS: ""
  # ex: "api-key=<token>" (New Relic) | "Authorization=Bearer <token>" (Grafana Cloud)
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  # Prod → "parentbased_traceidratio" com OTEL_TRACES_SAMPLER_ARG="0.1" (10%)
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  # Tracing provider: opentelemetry | datadog | cloudtrace | none
  TRACING_PROVIDER: "opentelemetry"
  # TraceID format: short-hash (12 chars) | uuid-no-hyphens (32 chars) | uuid-with-hyphens (36 chars)
  # Use uuid-no-hyphens for Jaeger/Tempo compatibility without hyphens in logs
  OTEL_ID_FORMAT: "uuid-with-hyphens"
  # Datadog (preencher ao migrar para Datadog APM)
  DD_AGENT_HOST: ""
  DD_ENV: ""
  DD_SERVICE: "domestic-api"
  DD_VERSION: ""
  # GCP (preencher ao migrar para Google Cloud — credencial via secret)
  GOOGLE_CLOUD_PROJECT: ""
  # Logging
  LOG_LEVEL: "debug"
  # E2E test vars — required by the migration datasource validation schema
  DATABASE_POSTGRES_TEST_E2E_HOST: "postgres"
  DATABASE_POSTGRES_TEST_E2E_PORT: "5432"
  DATABASE_POSTGRES_TEST_E2E_NAME: "backend_database_postgres_test_e2e"
  DATABASE_POSTGRES_TEST_E2E_USER: "domestic"
  DATABASE_POSTGRES_TEST_E2E_SYNCHRONIZE: "false"
  DATABASE_POSTGRES_TEST_E2E_LOGGING: "false"
  DATABASE_POSTGRES_TEST_E2E_TIMEZONE: "Z"
