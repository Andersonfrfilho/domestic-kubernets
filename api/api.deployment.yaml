apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: domestic
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-mongo
          image: busybox:1.36
          command: [sh, -c, "until nc -z mongo 27017; do echo waiting for mongo; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: [sh, -c, "until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"]
        - name: wait-for-minio
          image: busybox:1.36
          command: [sh, -c, "until nc -z minio 9000; do echo waiting for minio; sleep 2; done"]
        - name: wait-for-keycloak
          image: busybox:1.36
          command: [sh, -c, "until nc -z keycloak 8080; do echo waiting for keycloak; sleep 2; done"]
        - name: migrate
          image: ghcr.io/andersonfrfilho/domestic-backend-api:main
          imagePullPolicy: Always
          command: ["npm", "run", "migration:run"]
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
      containers:
        - name: api
          image: ghcr.io/andersonfrfilho/domestic-backend-api:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
