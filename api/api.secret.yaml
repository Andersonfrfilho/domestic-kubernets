apiVersion: v1
kind: Secret
metadata:
  name: api-secret
  namespace: domestic
  labels:
    app: api
type: Opaque
# IMPORTANT: Replace placeholder values before applying.
# Never commit real credentials to version control.
stringData:
  DATABASE_POSTGRES_USER: "domestic"
  DATABASE_POSTGRES_PASSWORD: "postgres1234"
  QUEUE_RABBITMQ_USER: "domestic"
  QUEUE_RABBITMQ_PASS: "backendapi123"
  STORAGE_MINIO_ACCESS_KEY: "domestic"
  STORAGE_MINIO_SECRET_KEY: "minioadmin"
  KEYCLOAK_CLIENT_SECRET: "api-client-secret"
  # MongoDB (only if auth enabled on mongo StatefulSet)
  DATABASE_MONGO_USERNAME: "mongo"
  DATABASE_MONGO_PASSWORD: "mongo1234"
  DATABASE_POSTGRES_TEST_E2E_PASSWORD: "postgres1234"
