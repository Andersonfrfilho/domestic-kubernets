apiVersion: batch/v1
kind: Job
metadata:
  name: migrator
  namespace: domestic
  labels:
    app: migrator
spec:
  backoffLimit: 3
  # Sem ttlSecondsAfterFinished: o Job fica como "Complete" indefinidamente.
  # Com selfHeal:true no ArgoCD, se ttl deletar o Job, ele seria recriado em loop
  # (cada ciclo de ~5min domina a fila de reconciliação e impede outros apps de sync).
  # ArgoCD recria o Job apenas quando o manifesto muda (novo commit com nova imagem).
  template:
    metadata:
      labels:
        app: migrator
    spec:
      restartPolicy: OnFailure
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: migrator
          image: ghcr.io/andersonfrfilho/domestic-backend-api:main
          imagePullPolicy: Always
          command: ["npm", "run", "migration:run"]
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
