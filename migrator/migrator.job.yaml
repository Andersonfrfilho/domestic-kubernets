apiVersion: batch/v1
kind: Job
metadata:
  name: migrator
  namespace: domestic
  labels:
    app: migrator
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: migrator
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - until nc -z postgres 5432; do echo "waiting for postgres..."; sleep 2; done
      containers:
        - name: migrator
          image: domestic-api:local
          imagePullPolicy: Never
          command: ["npm", "run", "migration:run"]
          envFrom:
            - configMapRef:
                name: api-config
            - secretRef:
                name: api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
