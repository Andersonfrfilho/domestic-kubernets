apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: domestic
  labels:
    app: worker
spec:
  selector:
    app: worker
  # ClusterIP: worker não precisa de acesso externo direto.
  # O Ingress em ingress-services.yaml expõe /health e /admin/queues opcionalmente.
  type: ClusterIP
  ports:
    - name: http
      port: 3002
      targetPort: 3002
