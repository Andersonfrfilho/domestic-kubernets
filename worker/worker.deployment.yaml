apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    build.timestamp: "2026-05-26T00:54:14Z"
    build.commit: "f66880a4700502c3cc8dd248c6b8baf30a3fe860"
  name: worker
  namespace: domestic
  labels:
    app: worker
spec:
  # Workers podem ser escalados horizontalmente para aumentar throughput de filas.
  # Cada réplica consome mensagens em paralelo do RabbitMQ.
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      annotations:
        build.timestamp: "2026-05-26T00:54:14Z"
        build.commit: "f66880a4700502c3cc8dd248c6b8baf30a3fe860"
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres 5432; do echo waiting for postgres; sleep 2; done"]
        - name: wait-for-rabbitmq
          image: busybox:1.36
          command: [sh, -c, "until nc -z rabbitmq 5672; do echo waiting for rabbitmq; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: worker
          # Registry local Ubuntu:  192.168.1.100:5000/domestic-worker:latest
          # Daemon minikube:        domestic-worker:local
          image: ghcr.io/andersonfrfilho/domestic-backend-worker:sha-f66880a
          imagePullPolicy: Always
          ports:
            # Health check e Bull Board (dashboard de filas), se habilitado
            - containerPort: 3002
              name: http
          env:
            - name: DEBUG_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: worker-secret
                  key: DATABASE_POSTGRES_PASSWORD
          envFrom:
            - configMapRef:
                name: worker-config
            - secretRef:
                name: worker-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep "node dist/main" | grep -v grep
            initialDelaySeconds: 100
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - ps aux | grep "node dist/main" | grep -v grep
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 10
            timeoutSeconds: 5
