apiVersion: v1
kind: ConfigMap
metadata:
  name: worker-config
  namespace: domestic
  labels:
    app: worker
data:
  NODE_ENV: "development"
  NODE_OPTIONS: "--max-old-space-size=512"
  PORT: "3002"
  # Banco principal
  DATABASE_POSTGRES_HOST: "postgres"
  DATABASE_POSTGRES_PORT: "5432"
  DATABASE_POSTGRES_NAME: "domestic_postgres"
  DATABASE_POSTGRES_SYNCHRONIZE: "false"
  DATABASE_POSTGRES_LOGGING: "false"
  DATABASE_POSTGRES_TIMEZONE: "Z"
  # MongoDB
  DATABASE_MONGO_HOST: "mongo"
  MONGO_URI: "mongodb://mongo:27017/backend_database_mongo"
  # Cache
  CACHE_REDIS_HOST: "redis"
  CACHE_REDIS_PORT: "6379"
  # Fila — worker consome mensagens do RabbitMQ
  QUEUE_RABBITMQ_HOST: "rabbitmq"
  QUEUE_RABBITMQ_PORT: "5672"
  RABBITMQ_URL: "amqp://domestic_worker:backendapi123@rabbitmq:5672"
  # QUEUE_RABBITMQ_USER e QUEUE_RABBITMQ_PASS vêm do Secret (worker-secret)
  # DATABASE_POSTGRES_USER and PASSWORD vêm do Secret (worker-secret)
  # Storage (para processar uploads, gerar relatórios, etc.)
  STORAGE_MINIO_ENDPOINT: "minio"
  STORAGE_MINIO_PORT: "9000"
  # ─── Observability ──────────────────────────────────────────────────────────
  OTEL_SERVICE_NAME: "domestic-worker"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://tempo:4318"
  OTEL_EXPORTER_OTLP_HEADERS: ""
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  TRACING_PROVIDER: "opentelemetry"
  OTEL_ID_FORMAT: "uuid-no-hyphens"
  DD_AGENT_HOST: ""
  DD_ENV: ""
  DD_SERVICE: "domestic-worker"
  DD_VERSION: ""
  GOOGLE_CLOUD_PROJECT: ""
  LOG_LEVEL: "debug"
