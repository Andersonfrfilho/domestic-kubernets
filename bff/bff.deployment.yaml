apiVersion: apps/v1
kind: Deployment
metadata:
  name: bff
  namespace: domestic
  labels:
    app: bff
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bff
  template:
    metadata:
      labels:
        app: bff
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: wait-for-api
          image: busybox:1.36
          command: [sh, -c, "until nc -z api 3000; do echo waiting for api; sleep 2; done"]
        - name: wait-for-keycloak
          image: busybox:1.36
          command: [sh, -c, "until nc -z keycloak 8080; do echo waiting for keycloak; sleep 2; done"]
        - name: wait-for-redis
          image: busybox:1.36
          command: [sh, -c, "until nc -z redis 6379; do echo waiting for redis; sleep 2; done"]
      containers:
        - name: bff
          # Registry local Ubuntu:  192.168.1.100:5000/domestic-bff:latest
          # Daemon minikube:        domestic-bff:local
          image: ghcr.io/andersonfrfilho/domestic-backend-bff:main
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - configMapRef:
                name: bff-config
            - secretRef:
                name: bff-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /bff/home
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
