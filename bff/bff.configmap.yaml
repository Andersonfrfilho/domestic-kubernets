apiVersion: v1
kind: ConfigMap
metadata:
  name: bff-config
  namespace: domestic
  labels:
    app: bff
data:
  NODE_ENV: "production"
  NODE_OPTIONS: "--max-old-space-size=512"
  PORT: "3001"
  # API interna — BFF chama a API via ClusterIP (não passa pelo Kong)
  API_BASE_URL: "http://api:3000"
  # Auth
  KEYCLOAK_BASE_URL: "http://keycloak:8080"
  KEYCLOAK_REALM: "domestic"
  KEYCLOAK_CLIENT_ID: "domestic-bff"
  KEYCLOAK_PORT: "8080"
  KEYCLOAK_ADMIN_USER: "domestic"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
  # Cache compartilhado com a API
  CACHE_REDIS_HOST: "redis"
  CACHE_REDIS_PORT: "6379"
  # MongoDB — BFF usa para cache de dashboard e persistência local
  MONGO_URI: "mongodb://mongo:27017/domestic-bff"
  # ─── Observability ──────────────────────────────────────────────────────────
  OTEL_SERVICE_NAME: "domestic-bff"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4318"
  OTEL_EXPORTER_OTLP_HEADERS: ""
  OTEL_TRACES_SAMPLER: "parentbased_always_on"
  OTEL_TRACES_SAMPLER_ARG: "1.0"
  TRACING_PROVIDER: "opentelemetry"
  DD_AGENT_HOST: ""
  DD_ENV: ""
  DD_SERVICE: "domestic-bff"
  DD_VERSION: ""
  GOOGLE_CLOUD_PROJECT: ""
  LOG_LEVEL: "debug"
  # Feature flags
  FEATURE_DOCUMENT_PHOTO_VERIFICATION: "true"
  # Upload
  UPLOAD_MAX_FILE_SIZE_MB: "10"
