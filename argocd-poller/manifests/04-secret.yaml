# Secret para armazenar tokens do GitHub e ArgoCD
# ⚠️ NÃO commitar com valores reais!
# Gerar com: kubectl create secret generic github-argocd-tokens ... --dry-run=client -o yaml

apiVersion: v1
kind: Secret
metadata:
  name: github-argocd-tokens
  namespace: argocd-poller
  labels:
    app.kubernetes.io/name: github-actions-poller
type: Opaque
data:
  # Gerar token GitHub em: https://github.com/settings/tokens/new
  # Permissões: repo + read:packages
  # Encode: echo -n "ghp_xxxxx" | base64
  github-token: Z2hwX3h4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4   # base64(token)

  # Gerar token ArgoCD via:
  # kubectl -n argocd create token github-poller --duration=87600h
  # Encode: echo -n "eyJhbGciOi..." | base64
  argocd-token: ZXlKaGJHY2lPaUpTVXpJMU5pSXNJbXRwWkNJNklpSjk=   # base64(token)
