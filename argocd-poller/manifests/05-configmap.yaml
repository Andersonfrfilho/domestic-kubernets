apiVersion: v1
kind: ConfigMap
metadata:
  name: github-poller-config
  namespace: argocd-poller
  labels:
    app.kubernetes.io/name: github-actions-poller
data:
  # Schedule do CronJob (formato cron padrão)
  # Valores comuns:
  #   * * * * *      → a cada 1 minuto
  #   */5 * * * *    → a cada 5 minutos
  #   */10 * * * *   → a cada 10 minutos
  #   0 * * * *      → a cada 1 hora
  SCHEDULE: "* * * * *"

  # Timeout para cada curl call (segundos)
  CURL_TIMEOUT: "10"

  # Número máximo de tentativas para API calls
  MAX_RETRIES: "3"

  # Intervalo interno de polling (futuro)
  POLL_INTERVAL: "40"
