apiVersion: v1
kind: ConfigMap
metadata:
  name: github-poller-script
  namespace: argocd-poller
  labels:
    app.kubernetes.io/name: github-actions-poller
data:
  poller.sh: |
    #!/bin/sh
    set -e

    GITHUB_TOKEN="$GITHUB_TOKEN"
    ARGOCD_SERVER="${ARGOCD_SERVER:-argocd-server.argocd:80}"
    ARGOCD_TOKEN="$ARGOCD_TOKEN"

    echo "=== GitHub Actions Poller - $(date) ==="
    echo "Monitoring 4 applications"
    echo ""

    REFRESH_COUNT=0
    RESTART_COUNT=0

    check_app() {
      local app_short=$1
      local gh_repo=$2
      local app_name=$3
      local k8s_deployment=$4
      local k8s_namespace=$5
      local image_repo=$6

      echo "Checking $app_name..."

      # Get latest successful GitHub Actions run
      gh_response=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/Andersonfrfilho/$gh_repo/actions/runs?status=success&per_page=1" 2>/dev/null || echo "{}")

      run_date=$(echo "$gh_response" | jq -r '.workflow_runs[0].created_at // empty' 2>/dev/null)
      run_sha=$(echo "$gh_response" | jq -r '.workflow_runs[0].head_sha // empty' 2>/dev/null)
      run_sha_short=$(echo "$run_sha" | cut -c1-10)

      if [ -z "$run_date" ] || [ -z "$run_sha" ]; then
        echo "  ✗ No successful runs found"
        echo ""
        return
      fi

      echo "  ✓ Latest run: $run_date"
      echo "  SHA: $run_sha_short"

      # Trigger refresh to ensure ArgoCD is synced
      echo "  → Triggering ArgoCD refresh..."

      curl -s -X POST -m 10 http://argocd-server.argocd:80/api/v1/applications/$app_name/refresh \
        -H "Authorization: Bearer $ARGOCD_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{}' > /dev/null 2>&1

      echo "  ✓ Refresh triggered"
      REFRESH_COUNT=$((REFRESH_COUNT + 1))

      # Sleep briefly to let refresh happen
      sleep 3

      # Get current running image hash
      running_pod=$(kubectl get pods -n $k8s_namespace -l app.kubernetes.io/name=$k8s_deployment -o jsonpath='{.items[0].metadata.name}' 2>/dev/null)

      if [ -z "$running_pod" ]; then
        echo "  ⚠ No running pods found"
        echo ""
        return
      fi

      running_image=$(kubectl get pods -n $k8s_namespace $running_pod -o jsonpath='{.status.containerStatuses[0].imageID}' 2>/dev/null | grep -oE 'sha256:[a-f0-9]+' || echo "")

      # Get latest image hash from registry (pull and inspect)
      latest_image=$(docker pull $image_repo:main 2>/dev/null | grep -oE 'sha256:[a-f0-9]+' | head -1 || echo "")

      if [ -n "$running_image" ] && [ -n "$latest_image" ] && [ "$running_image" = "$latest_image" ]; then
        echo "  ✓ Image unchanged (hash: ${running_image:7:12})"
        echo "  → SKIPPED (no image change)"
        echo ""
        return
      fi

      # Image changed - restart pods
      echo "  → New image detected!"
      echo "  → Restarting pods..."

      kubectl patch deployment/$k8s_deployment -n $k8s_namespace \
        -p "{\"spec\":{\"template\":{\"metadata\":{\"labels\":{\"commit-sha\":\"$run_sha_short\"}}}}}" 2>&1 >/dev/null || true

      if kubectl rollout restart deployment/$k8s_deployment -n $k8s_namespace 2>&1 | grep -q "restarted"; then
        echo "  ✓ Restart triggered (version: $run_sha_short)"
        RESTART_COUNT=$((RESTART_COUNT + 1))
      fi

      echo ""
    }

    # Check each application with image repo
    check_app "api" "domestic-backend-api" "domestic-api" "api" "domestic" "ghcr.io/andersonfrfilho/domestic-backend-api"
    check_app "bff" "domestic-backend-bff" "domestic-bff" "bff" "domestic" "ghcr.io/andersonfrfilho/domestic-backend-bff"
    check_app "worker" "domestic-backend-worker" "domestic-worker" "worker" "domestic" "ghcr.io/andersonfrfilho/domestic-backend-worker"
    check_app "cron" "domestic-backend-cron" "domestic-cron" "cron" "domestic" "ghcr.io/andersonfrfilho/domestic-backend-cron"

    echo "=== Poll cycle completed ==="
    echo "Refreshes triggered: $REFRESH_COUNT"
    echo "Pod restarts triggered: $RESTART_COUNT"
