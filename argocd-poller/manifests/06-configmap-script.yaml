apiVersion: v1
kind: ConfigMap
metadata:
  name: github-poller-script
  namespace: argocd-poller
  labels:
    app.kubernetes.io/name: github-actions-poller
data:
  poller.sh: |
    #!/bin/sh
    set -e

    GITHUB_TOKEN="$GITHUB_TOKEN"
    ARGOCD_SERVER="${ARGOCD_SERVER:-argocd-server.argocd:443}"
    ARGOCD_TOKEN="$ARGOCD_TOKEN"

    echo "=== GitHub Actions Poller - $(date) ==="
    echo "Monitoring 4 applications"
    echo ""

    REFRESH_COUNT=0

    check_app() {
      local app_short=$1
      local gh_repo=$2
      local app_name=$3

      echo "Checking $app_name..."

      # Get latest successful GitHub Actions run - use jq for proper JSON parsing
      gh_response=$(curl -s \
        -H "Authorization: token $GITHUB_TOKEN" \
        -H "Accept: application/vnd.github.v3+json" \
        "https://api.github.com/repos/Andersonfrfilho/$gh_repo/actions/runs?status=success&per_page=1" 2>/dev/null || echo "{}")

      # Extract using jq instead of grep
      run_date=$(echo "$gh_response" | jq -r '.workflow_runs[0].created_at // empty' 2>/dev/null)
      run_sha=$(echo "$gh_response" | jq -r '.workflow_runs[0].head_sha // empty' 2>/dev/null)

      if [ -z "$run_date" ] || [ -z "$run_sha" ]; then
        echo "  ✗ No successful runs found"
        echo ""
        return
      fi

      echo "  ✓ Latest run: $run_date"
      echo "  SHA: ${run_sha:0:10}"

      # Try to get current SHA from ArgoCD via HTTP (port 80, not 443)
      app_revision=$(curl -s -m 5 http://argocd-server.argocd:80/api/v1/applications/$app_name \
        -H "Authorization: Bearer $ARGOCD_TOKEN" 2>/dev/null | jq -r '.status.sync.revision // .status.operationState.syncResult.revision // empty' 2>/dev/null)

      echo "  Current revision in ArgoCD: ${app_revision:0:10}"

      # Compare SHAs - only refresh if they differ
      if [ -n "$app_revision" ] && [ "$run_sha" = "$app_revision" ]; then
        echo "  ⚠ SHA unchanged - already deployed"
        echo "  → SKIPPED (no changes)"
        echo ""
        return
      fi

      # Trigger refresh
      echo "  → New commit detected!"
      echo "  → Triggering ArgoCD refresh..."

      curl -s -X POST -m 10 http://argocd-server.argocd:80/api/v1/applications/$app_name/refresh \
        -H "Authorization: Bearer $ARGOCD_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{}' > /dev/null 2>&1

      echo "  ✓ Refresh triggered"
      REFRESH_COUNT=$((REFRESH_COUNT + 1))
      echo ""
    }

    # Check each application
    check_app "api" "domestic-backend-api" "domestic-api"
    check_app "bff" "domestic-backend-bff" "domestic-bff"
    check_app "worker" "domestic-backend-worker" "domestic-worker"
    check_app "cron" "domestic-backend-cron" "domestic-cron"

    echo "=== Poll cycle completed: $REFRESH_COUNT refresh(es) triggered ==="
