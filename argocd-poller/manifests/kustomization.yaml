apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespace para todos os recursos (exceto alguns no argocd)
namespace: argocd-poller

# Lista de manifestos a aplicar (em ordem)
resources:
  - 01-namespace.yaml
  - 02-serviceaccount.yaml
  - 03-rbac.yaml
  # - 04-secret.yaml          # Comentado: preencher manualmente com tokens reais!
  - 05-configmap.yaml
  - 06-configmap-script.yaml
  - 07-cronjob.yaml
  - 08-application.yaml

# Labels comuns em todos os recursos
commonLabels:
  app.kubernetes.io/name: github-actions-poller
  app.kubernetes.io/managed-by: kustomize

# Annotations comuns
commonAnnotations:
  app.kubernetes.io/description: "GitHub Actions Poller - Auto-deploy via polling"

# Imagens (para atualizações automáticas)
images:
- name: alpine
  newTag: "latest"
