apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: domestic
  labels:
    app: postgres-exporter
type: Opaque
# IMPORTANT: Replace placeholder values before applying in production.
stringData:
  # Format: postgresql://user:password@host:port/database?sslmode=disable
  DATA_SOURCE_NAME: "postgresql://domestic:postgres1234@postgres:5432/domestic?sslmode=disable"
