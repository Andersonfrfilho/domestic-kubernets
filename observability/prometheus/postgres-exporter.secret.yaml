apiVersion: v1
kind: Secret
metadata:
  name: postgres-exporter-secret
  namespace: domestic
  labels:
    app: postgres-exporter
type: Opaque
# IMPORTANT: Replace placeholder values before applying in production.
stringData:
  # Format: postgresql://user:password@host:port/database?sslmode=disable
  # Using backend_api user which has access to domestic_postgres
  DATA_SOURCE_NAME: "postgresql://backend_api:backendapi123@postgres:5432/domestic_postgres?sslmode=disable"
