apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: domestic
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      initContainers:
        - name: wait-for-services
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z api 3000; do echo waiting for api; sleep 2; done
              until nc -z bff 3001; do echo waiting for bff; sleep 2; done
              until nc -z worker 3002; do echo waiting for worker; sleep 2; done
              until nc -z cron 3003; do echo waiting for cron; sleep 2; done
              echo All services are ready
      containers:
        - name: prometheus
          image: prom/prometheus:latest
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.console.libraries=/etc/prometheus/console_libraries"
            - "--web.console.templates=/etc/prometheus/consoles"
            - "--storage.tsdb.retention.time=200h"
            - "--web.enable-lifecycle"
            - "--web.enable-remote-write-receiver"
          ports:
            - containerPort: 9090
              name: http
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
              readOnly: true
            - name: prometheus-data
              mountPath: /prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        # Created via: kubectl create configmap prometheus-scrape-config \
        #   --from-file=prometheus.yml=./monitoring/prometheus.yml -n domestic
        - name: prometheus-config
          configMap:
            name: prometheus-scrape-config
        - name: prometheus-data
          emptyDir: {}
