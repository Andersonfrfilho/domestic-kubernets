apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scrape-config
  namespace: domestic
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'domestic-api'
        static_configs:
          - targets: ['api:3000']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'domestic-bff'
        static_configs:
          - targets: ['bff:3001']
        metrics_path: /bff/metrics
        scrape_interval: 10s

      - job_name: 'domestic-worker'
        static_configs:
          - targets: ['worker:3002']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'domestic-cron'
        static_configs:
          - targets: ['cron:3003']
        metrics_path: /metrics
        scrape_interval: 30s

      - job_name: 'redis'
        static_configs:
          - targets: ['redis-exporter:9121']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'mongodb'
        static_configs:
          - targets: ['mongodb-exporter:9216']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'postgres'
        static_configs:
          - targets: ['postgres-exporter:9187']
        metrics_path: /metrics
        scrape_interval: 15s

      - job_name: 'kong'
        static_configs:
          - targets: ['kong:8001']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'keycloak'
        static_configs:
          - targets: ['keycloak:9000']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'kubernetes-cadvisor'
        kubernetes_sd_configs:
          - role: pod
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          insecure_skip_verify: true
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          # Only scrape pods in domestic namespace
          - source_labels: [__meta_kubernetes_namespace]
            action: keep
            regex: domestic
          # Map pod labels
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          # Add pod_name label
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: pod_name
          # Add pod_namespace label
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: pod_namespace
          # Add node label
          - source_labels: [__meta_kubernetes_node_name]
            action: replace
            target_label: node
