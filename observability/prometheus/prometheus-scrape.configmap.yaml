apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-scrape-config
  namespace: domestic
  labels:
    app: prometheus
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      - job_name: 'domestic-api'
        static_configs:
          - targets: ['api:3000']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'domestic-bff'
        static_configs:
          - targets: ['bff:3001']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'domestic-worker'
        static_configs:
          - targets: ['worker:3002']
        metrics_path: /metrics
        scrape_interval: 10s

      - job_name: 'domestic-cron'
        static_configs:
          - targets: ['cron:3003']
        metrics_path: /metrics
        scrape_interval: 30s
