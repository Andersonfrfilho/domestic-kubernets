apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-logs
  namespace: domestic
  labels:
    app: grafana
data:
  logs.json: |
    {
      "title": "Domestic Logs",
      "uid": "domestic-logs",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "All Domestic Logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 10 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 2,
          "title": "Email Sending Issues",
          "type": "logs",
          "gridPos": { "x": 0, "y": 10, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"} |= \"mail\" or \"verification\" or \"email\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 3,
          "title": "Authentication Issues",
          "type": "logs",
          "gridPos": { "x": 12, "y": 10, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"} |= \"auth\" or \"keycloak\" or \"unauthorized\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 4,
          "title": "RabbitMQ/Queue Issues",
          "type": "logs",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"} |= \"queue\" or \"rabbit\" or \"amqp\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 5,
          "title": "Database Errors",
          "type": "logs",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"} |= \"database\" or \"postgres\" or \"query\" or \"error\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 6,
          "title": "Worker Issues",
          "type": "logs",
          "gridPos": { "x": 0, "y": 26, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\"} |= \"worker\" or \"failed\" or \"exception\" or \"error\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 7,
          "title": "All Logs with level extraction",
          "type": "logs",
          "gridPos": { "x": 12, "y": 26, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\", level=\"WARN\"} | {namespace=\"domestic\", level=\"ERROR\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 8,
          "title": "API Logs - Last 100 lines",
          "type": "logs",
          "gridPos": { "x": 0, "y": 34, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\", app=\"api\"} | tail(100)",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
        {
          "id": 9,
          "title": "Cron Logs - Last 100 lines",
          "type": "logs",
          "gridPos": { "x": 12, "y": 34, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\", app=\"cron\"} | tail(100)",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": true,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ]
    }
