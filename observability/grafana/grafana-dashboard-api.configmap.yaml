apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-api
  namespace: domestic
  labels:
    app: grafana
data:
  api.json: |
    {
      "title": "Domestic API",
      "uid": "domestic-api",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "query": "1m,5m,10m,30m",
            "current": { "value": "5m" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"domestic-api\"}[$interval])) by (route)",
              "legendFormat": "{{route}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 2,
          "title": "Error Rate (5xx %)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"domestic-api\",status_code=~\"5..\"}[$interval])) / sum(rate(http_requests_total{job=\"domestic-api\"}[$interval])) * 100",
              "legendFormat": "Error %",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 3,
          "title": "Latency P50 / P95 / P99 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(http_request_duration_seconds_bucket{job=\"domestic-api\"}[$interval])) by (le))",
              "legendFormat": "p50",
              "datasource": "Prometheus"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket{job=\"domestic-api\"}[$interval])) by (le))",
              "legendFormat": "p95",
              "datasource": "Prometheus"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(http_request_duration_seconds_bucket{job=\"domestic-api\"}[$interval])) by (le))",
              "legendFormat": "p99",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 4,
          "title": "Request Rate by Status Code",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"domestic-api\"}[$interval])) by (status_code)",
              "legendFormat": "{{status_code}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 5,
          "title": "Request Volume (1h)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"domestic-api\"}[1h]))",
              "legendFormat": "Req/sec",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 6,
          "title": "Successful Requests %",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{job=\"domestic-api\",status_code=~\"2..\"}[5m])) / sum(rate(http_requests_total{job=\"domestic-api\"}[5m])) * 100",
              "legendFormat": "Success %",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 7,
          "title": "Total Requests",
          "type": "stat",
          "gridPos": { "x": 18, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(http_requests_total{job=\"domestic-api\"})",
              "legendFormat": "Total",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 8,
          "title": "API Logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 10 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\",pod_name=~\"api-.*\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        },
      ]
    }
