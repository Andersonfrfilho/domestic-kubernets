apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-infrastructure-v2
  namespace: domestic
  labels:
    app: grafana
data:
  infrastructure-v2.json: |
    {
      "title": "Infrastructure — System Health",
      "uid": "infrastructure-v2",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "query": "1m,5m,15m,30m",
            "current": { "value": "5m" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Prometheus Targets Up",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "count(up{job!=\"prometheus\"} == 1)",
              "legendFormat": "Up",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 2,
          "title": "Prometheus Targets Down",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "count(up{job!=\"prometheus\"} == 0)",
              "legendFormat": "Down",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 3,
          "title": "Loki Storage Used (GB)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "loki_disk_chunks_total / 1024 / 1024 / 1024",
              "legendFormat": "Used",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 4,
          "title": "Prometheus Memory Usage (MB)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "process_resident_memory_bytes{job=\"prometheus\"} / 1024 / 1024",
              "legendFormat": "Memory",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 5,
          "title": "HTTP Requests Total (all services)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[$interval])) by (job)",
              "legendFormat": "{{job}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 6,
          "title": "Error Rate by Service",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(http_requests_total{status_code=~\"5..\"}[$interval])) by (job) / sum(rate(http_requests_total[$interval])) by (job) * 100",
              "legendFormat": "{{job}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 7,
          "title": "RabbitMQ Connections",
          "type": "stat",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(rabbitmq_connections)",
              "legendFormat": "Connections",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 8,
          "title": "PostgreSQL Connections",
          "type": "stat",
          "gridPos": { "x": 6, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "pg_stat_activity_count{job=\"postgres\"}",
              "legendFormat": "Connections",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 9,
          "title": "Redis Memory Usage (MB)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "redis_memory_used_bytes / 1024 / 1024",
              "legendFormat": "Used",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 10,
          "title": "MongoDB Connections",
          "type": "stat",
          "gridPos": { "x": 18, "y": 16, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "mongodb_connections{state=\"current\"}",
              "legendFormat": "Current",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 11,
          "title": "Queue Messages by Status",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(rabbitmq_queue_messages_ready[$interval])) by (queue)",
              "legendFormat": "{{queue}} (ready)",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 12,
          "title": "Database Size (GB)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "pg_database_size_bytes{job=\"postgres\", datname=\"domestic\"} / 1024 / 1024 / 1024",
              "legendFormat": "PostgreSQL",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 13,
          "title": "System Health - Logs (last 100 errors)",
          "type": "logs",
          "gridPos": { "x": 0, "y": 32, "w": 24, "h": 10 },
          "targets": [
            {
              "expr": "{job=\"kubernetes-pods\"} |= \"error\" or \"ERROR\" or \"Exception\"",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ]
    }
