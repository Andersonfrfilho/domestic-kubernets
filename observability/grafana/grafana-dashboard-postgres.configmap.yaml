apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-postgres
  namespace: domestic
  labels:
    app: grafana
data:
  postgres.json: |
    {
      "title": "PostgreSQL Database",
      "uid": "postgres",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "query": "5m,15m,30m,1h",
            "current": { "value": "15m" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Active Connections",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "pg_stat_activity_count{job=\"postgres\"}",
              "legendFormat": "Connections",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 2,
          "title": "Database Size (MB)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "pg_database_size_bytes{job=\"postgres\", datname=\"domestic\"} / 1024 / 1024",
              "legendFormat": "Size (MB)",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 3,
          "title": "Transactions/s",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(pg_stat_user_tables_seq_scan{job=\"postgres\"}[$interval]))",
              "legendFormat": "Tx/s",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 4,
          "title": "Deadlocks (1h)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "increase(pg_stat_user_tables_n_tup_del{job=\"postgres\"}[1h])",
              "legendFormat": "Deadlocks",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 5,
          "title": "Cache Hit Ratio (%)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(pg_stat_user_tables_idx_scan[5m])) / (sum(rate(pg_stat_user_tables_idx_scan[5m])) + sum(rate(pg_stat_user_tables_seq_scan[5m]))) * 100",
              "legendFormat": "Index Hit Ratio",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 6,
          "title": "Replication Lag (ms)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "pg_replication_lag_seconds{job=\"postgres\"} * 1000",
              "legendFormat": "Lag (ms)",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 7,
          "title": "Top Tables by Size (MB)",
          "type": "barchart",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "topk(10, pg_table_size_bytes{job=\"postgres\"} / 1024 / 1024)",
              "legendFormat": "{{schemaname}}.{{tablename}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 8,
          "title": "Tuples by Operation (5m)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(pg_stat_user_tables_n_tup_ins[5m])",
              "legendFormat": "Inserts",
              "datasource": "Prometheus"
            },
            {
              "expr": "rate(pg_stat_user_tables_n_tup_upd[5m])",
              "legendFormat": "Updates",
              "datasource": "Prometheus"
            },
            {
              "expr": "rate(pg_stat_user_tables_n_tup_del[5m])",
              "legendFormat": "Deletes",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 9,
          "title": "Pod CPU Usage",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(container_cpu_usage_seconds_total{namespace=\"domestic\", pod_name=~\"postgres-.*\"}[5m])",
              "legendFormat": "{{pod_name}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 10,
          "title": "Pod Memory Usage (MB)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 24, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "container_memory_working_set_bytes{namespace=\"domestic\", pod_name=~\"postgres-.*\"} / 1024 / 1024",
              "legendFormat": "{{pod_name}}",
              "datasource": "Prometheus"
            }
          ]
        }
      ]
    }
