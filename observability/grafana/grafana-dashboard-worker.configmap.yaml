apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-worker
  namespace: domestic
  labels:
    app: grafana
data:
  worker.json: |
    {
      "title": "Domestic Worker",
      "uid": "domestic-worker",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "interval",
            "type": "interval",
            "query": "1m,5m,10m,30m",
            "current": { "value": "5m" }
          }
        ]
      },
      "panels": [
        {
          "id": 1,
          "title": "Messages Processed Rate (msg/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(queue_messages_processed_total{service=\"domestic-worker\"}[$interval])) by (queue)",
              "legendFormat": "{{queue}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 2,
          "title": "Failed Messages Rate (msg/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "sum(rate(queue_messages_processed_total{service=\"domestic-worker\",status=\"failed\"}[$interval])) by (queue)",
              "legendFormat": "{{queue}} failed",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 3,
          "title": "Processing Duration P50 / P95 / P99 (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(queue_message_processing_duration_seconds_bucket{service=\"domestic-worker\"}[$interval])) by (le, queue))",
              "legendFormat": "p50 {{queue}}",
              "datasource": "Prometheus"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(queue_message_processing_duration_seconds_bucket{service=\"domestic-worker\"}[$interval])) by (le, queue))",
              "legendFormat": "p95 {{queue}}",
              "datasource": "Prometheus"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(queue_message_processing_duration_seconds_bucket{service=\"domestic-worker\"}[$interval])) by (le, queue))",
              "legendFormat": "p99 {{queue}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 4,
          "title": "Total Processed (all time)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(queue_messages_processed_total{service=\"domestic-worker\",status=\"success\"})",
              "legendFormat": "Success",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 5,
          "title": "Total Failed (all time)",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "sum(queue_messages_processed_total{service=\"domestic-worker\",status=\"failed\"})",
              "legendFormat": "Failed",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 6,
          "title": "Node.js Heap Used (bytes)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "nodejs_heap_size_used_bytes{job=\"domestic-worker\"}",
              "legendFormat": "Heap Used",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 7,
          "title": "Worker Logs",
          "type": "logs",
          "gridPos": { "x": 0, "y": 24, "w": 24, "h": 10 },
          "targets": [
            {
              "expr": "{namespace=\"domestic\", app=\"worker\"}",
              "legendFormat": "",
              "datasource": "Loki"
            }
          ],
          "options": {
            "showLabels": false,
            "showTime": true,
            "sortOrder": "Descending",
            "wrapLogMessage": true
          }
        }
      ]
    }
