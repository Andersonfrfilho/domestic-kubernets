apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mongodb
  namespace: domestic
  labels:
    app: grafana
data:
  mongodb.json: |
    {
      "title": "MongoDB",
      "uid": "mongodb",
      "version": 1,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": []
      },
      "panels": [
        {
          "id": 1,
          "title": "Connections",
          "type": "stat",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "mongodb_connections_current",
              "legendFormat": "Current",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 2,
          "title": "Uptime (hours)",
          "type": "stat",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "mongodb_uptime_seconds / 3600",
              "legendFormat": "Hours",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 3,
          "title": "Memory (MB)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "mongodb_memory_resident",
              "legendFormat": "Resident",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 4,
          "title": "Operations Rate (ops/s)",
          "type": "timeseries",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 8 },
          "targets": [
            {
              "expr": "rate(mongodb_opcounters_total[1m])",
              "legendFormat": "{{type}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 5,
          "title": "Document Operations",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "rate(mongodb_opcounters_total{type=~\"insert|update|delete|query\"}[1m])",
              "legendFormat": "{{type}}",
              "datasource": "Prometheus"
            }
          ]
        },
        {
          "id": 6,
          "title": "Database Sizes",
          "type": "barchart",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            {
              "expr": "mongodb_database_size_bytes / 1024 / 1024",
              "legendFormat": "{{database}}",
              "datasource": "Prometheus"
            }
          ]
        }
      ]
    }
