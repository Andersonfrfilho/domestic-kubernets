apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: domestic
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      initContainers:
        - name: wait-for-prometheus
          image: busybox:1.36
          command: [sh, -c, "until nc -z prometheus 9090; do echo waiting for prometheus; sleep 2; done"]
        - name: wait-for-loki
          image: busybox:1.36
          command: [sh, -c, "until nc -z loki 3100; do echo waiting for loki; sleep 2; done"]
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_AUTH_GENERIC_OAUTH_ENABLED
              value: "true"
            - name: GF_AUTH_GENERIC_OAUTH_NAME
              value: "Keycloak"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_ID
              value: "grafana"
            - name: GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET
              value: "grafana-client-secret"
            - name: GF_AUTH_GENERIC_OAUTH_SCOPES
              value: "openid profile email groups"
            - name: GF_AUTH_GENERIC_OAUTH_AUTH_URL
              value: "http://keycloak.domestic.local/realms/domestic/protocol/openid-connect/auth"
            - name: GF_AUTH_GENERIC_OAUTH_TOKEN_URL
              value: "http://keycloak.domestic.local/realms/domestic/protocol/openid-connect/token"
            - name: GF_AUTH_GENERIC_OAUTH_API_URL
              value: "http://keycloak.domestic.local/realms/domestic/protocol/openid-connect/userinfo"
            - name: GF_AUTH_GENERIC_OAUTH_ROLE_ATTRIBUTE_PATH
              value: "contains(groups[*], 'admin') && 'Admin' || 'Viewer'"
            - name: GF_AUTH_GENERIC_OAUTH_ALLOW_ASSIGN_GRAFANA_ADMIN
              value: "true"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.domestic.local"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
              readOnly: true
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
              readOnly: true
            - name: grafana-dashboard-api
              mountPath: /var/lib/grafana/dashboards/api.json
              subPath: api.json
              readOnly: true
            - name: grafana-dashboard-bff
              mountPath: /var/lib/grafana/dashboards/bff.json
              subPath: bff.json
              readOnly: true
            - name: grafana-dashboard-worker
              mountPath: /var/lib/grafana/dashboards/worker.json
              subPath: worker.json
              readOnly: true
            - name: grafana-dashboard-cron
              mountPath: /var/lib/grafana/dashboards/cron.json
              subPath: cron.json
              readOnly: true
            - name: grafana-dashboard-redis
              mountPath: /var/lib/grafana/dashboards/redis.json
              subPath: redis.json
              readOnly: true
            - name: grafana-dashboard-mongodb
              mountPath: /var/lib/grafana/dashboards/mongodb.json
              subPath: mongodb.json
              readOnly: true
            - name: grafana-dashboard-logs
              mountPath: /var/lib/grafana/dashboards/logs.json
              subPath: logs.json
              readOnly: true
            - name: grafana-dashboard-infrastructure
              mountPath: /var/lib/grafana/dashboards/infrastructure.json
              subPath: infrastructure.json
              readOnly: true
            - name: grafana-dashboard-kong
              mountPath: /var/lib/grafana/dashboards/kong.json
              subPath: kong.json
              readOnly: true
            - name: grafana-dashboard-keycloak
              mountPath: /var/lib/grafana/dashboards/keycloak.json
              subPath: keycloak.json
              readOnly: true
            - name: grafana-dashboard-postgres
              mountPath: /var/lib/grafana/dashboards/postgres.json
              subPath: postgres.json
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: grafana-data
          emptyDir: {}
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: grafana-dashboard-api
          configMap:
            name: grafana-dashboard-api
        - name: grafana-dashboard-bff
          configMap:
            name: grafana-dashboard-bff
        - name: grafana-dashboard-worker
          configMap:
            name: grafana-dashboard-worker
        - name: grafana-dashboard-cron
          configMap:
            name: grafana-dashboard-cron
        - name: grafana-dashboard-redis
          configMap:
            name: grafana-dashboard-redis
        - name: grafana-dashboard-mongodb
          configMap:
            name: grafana-dashboard-mongodb
        - name: grafana-dashboard-logs
          configMap:
            name: grafana-dashboard-logs
        - name: grafana-dashboard-infrastructure
          configMap:
            name: grafana-dashboard-infrastructure
        - name: grafana-dashboard-kong
          configMap:
            name: grafana-dashboard-kong
        - name: grafana-dashboard-keycloak
          configMap:
            name: grafana-dashboard-keycloak
        - name: grafana-dashboard-postgres
          configMap:
            name: grafana-dashboard-postgres
