apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-args-config
  namespace: domestic
  labels:
    app: loki
data:
  config-path: "/etc/loki/local-config.yaml"
# NOTE: loki-config.yml is mounted from a separate ConfigMap.
# Create it before applying:
#   kubectl create configmap loki-config \
#     --from-file=local-config.yaml=./monitoring/loki-config.yml -n domestic
