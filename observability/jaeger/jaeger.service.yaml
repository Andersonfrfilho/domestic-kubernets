apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: domestic
  labels:
    app: jaeger
spec:
  selector:
    app: jaeger
  type: NodePort
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
      nodePort: 30686
    - name: collector-http
      port: 14268
      targetPort: 14268
    - name: collector-grpc
      port: 14250
      targetPort: 14250
    - name: zipkin
      port: 9411
      targetPort: 9411
