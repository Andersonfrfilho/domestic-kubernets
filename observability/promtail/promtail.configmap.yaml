apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods-domestic
        static_configs:
          - targets:
              - localhost
            labels:
              namespace: domestic
              __path__: /var/log/pods/domestic_*/*/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                message: message
                context: context
                requestId: requestId
          - labels:
              level:
              context:
        relabel_configs:
          - source_labels: [__path__]
            regex: '.*/domestic_([^_/]+)-[^_/]+-[^_/]+_[^/]+/([^/]+)/\d+\.log'
            target_label: app
            replacement: '$1'
          - source_labels: [__path__]
            regex: '.*/domestic_[^/]+/([^/]+)/\d+\.log'
            target_label: container
            replacement: '$1'
