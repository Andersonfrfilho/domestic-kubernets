apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: domestic
        static_configs:
          - targets:
              - localhost
            labels:
              job: domestic
              __path__: /var/log/pods/domestic_*/*/*.log
        decompression: gzip
        skip_older_than: 72h
        pipeline_stages:
          - cri: {}
          - multiline:
              firstline: '(^\[|^\{|^\d{4}-)'
          - json:
              expressions:
                level: level
                message: message
                timestamp: timestamp
              on_error: keep
          - timestamp:
              source: timestamp
              format: RFC3339Nano
              fallbacks:
                - "UnixMs"
                - "Unix"
              on_error: keep
          - labels:
              level:
          - output:
              source: message
