apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: domestic
        static_configs:
          - targets:
              - localhost
            labels:
              job: domestic
              __path__: /var/log/pods/domestic_*/*/*.log
        pipeline_stages:
          - cri: {}
          - multiline:
              firstline: '(^\[|^\{|^\d{4}-)'
          # Extrai request_id do formato [requestId][timestamp][service:ver][Class.method][LEVEL]
          # Exemplos de requestId: ZATBA4U9 | no-request-id | cron:job:1abc | msg:email:1abc
          - regex:
              expression: '^\[(?P<request_id>[^\]]+)\]\[[^\]]+\]\[(?P<service_name>[^:\]]+)'
          - json:
              expressions:
                level: level
                message: message
                timestamp: timestamp
              on_error: keep
          - timestamp:
              source: timestamp
              format: RFC3339Nano
              fallbacks:
                - "UnixMs"
                - "Unix"
              on_error: keep
          - labels:
              level:
              request_id:
              service_name:
          - output:
              source: message
