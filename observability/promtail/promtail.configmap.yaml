apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: docker
        static_configs:
          - targets:
              - localhost
            labels:
              job: docker
              __path__: /var/lib/docker/containers/*/*.log
      - job_name: kubernetes-pods
        static_configs:
          - targets:
              - localhost
            labels:
              job: kubernetes-pods
              __path__: /var/log/pods/*/*/*.log
        pipeline_stages:
          - multiline:
              firstline: '(^\{|^\d{4}-)'
          - cri: {}
          - json:
              expressions:
                level: level
                message: message
                context: context
                requestId: requestId
          - labels:
              level:
              context:
              service_name:
              namespace:
              pod:
              container:
