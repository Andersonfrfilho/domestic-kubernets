apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        kubernetes_sd_configs:
          - role: pods
            namespace: domestic
        static_configs:
          - targets:
              - localhost
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level: level
                message: message
                context: context
                requestId: requestId
          - labels:
              level:
              context:
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: app
