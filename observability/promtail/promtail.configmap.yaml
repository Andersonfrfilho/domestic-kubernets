apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: domestic
  labels:
    app: promtail
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /var/lib/promtail/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: domestic
        static_configs:
          - targets:
              - localhost
            labels:
              job: domestic
              __path__: /var/log/pods/domestic_*/*/*.log
        pipeline_stages:
          - cri: {}
          - multiline:
              firstline: '(^\[|^\{|^\d{4}-)'
          # Remove ANSI color codes before label extraction (colorize: true in dev containers)
          - replace:
              expression: '\x1b\[[0-9;]*m'
              replace: ''
          # Extrai do formato JSON (isProduction=true): {"requestId":"...","appName":"...","level":"..."}
          # Extrai do formato texto (isProduction=false): [requestId][timestamp][service:ver][Class.method][LEVEL]
          - json:
              expressions:
                level: level
                message: message
                timestamp: timestamp
                request_id: requestId
                service_name: appName
              on_error: keep
          # Fallback para texto: extrai request_id e service_name se JSON não encontrou (infra logs, texto)
          - regex:
              expression: '^\[(?P<request_id>[^\]]+)\]\[[^\]]+\]\[(?P<service_name>[^:\]]+)'
          - timestamp:
              source: timestamp
              format: RFC3339Nano
              fallbacks:
                - "UnixMs"
                - "Unix"
              on_error: keep
          - labels:
              level:
              request_id:
              service_name:
          - output:
              source: message
