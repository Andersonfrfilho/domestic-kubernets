# Habilita modo HTTP no ArgoCD server (sem TLS).
# Em produção use TLS + cert-manager. Para rede local HTTP é suficiente.
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
  namespace: argocd
data:
  server.insecure: "true"
  # Expira o cache de revision (branch → SHA) a cada 1 minuto.
  # Sem webhooks (home lab), isso garante que o ArgoCD detecte
  # novos commits no git em até ~1 minuto após o push.
  reposerver.default.cache.expiration: "1m"
