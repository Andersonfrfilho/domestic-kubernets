apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: domestic-api
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: domestic
  annotations:
    argocd.argoproj.io/sync-wave: "3"
    argocd-image-updater.argoproj.io/image-list: api=ghcr.io/andersonfrfilho/domestic-backend-api
    argocd-image-updater.argoproj.io/api.update-strategy: latest
    argocd-image-updater.argoproj.io/api.allow-tags: regexp:^(main|v[0-9]+\.[0-9]+\.[0-9]+)$
    argocd-image-updater.argoproj.io/git-branch: main
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: domestic
  source:
    repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
    targetRevision: main
    path: api
  destination:
    server: https://kubernetes.default.svc
    namespace: domestic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - Replace=false
    retry:
      limit: 5
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    - group: batch
      kind: Job
      jsonPointers:
        - /spec/selector
        - /spec/template/metadata/labels
