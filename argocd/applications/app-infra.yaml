# ArgoCD Application — Infraestrutura stateful
# Gerencia: PostgreSQL (app), MongoDB, Redis, RabbitMQ, MinIO
#
# Sync wave 1: esses serviços sobem primeiro.
# Os demais Applications dependem deles indiretamente via initContainers.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: domestic-infra
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: domestic
  annotations:
    # Sync wave: infra sobe antes de auth e app
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: domestic

  # Multi-source: cada diretório é uma source separada (ArgoCD v2.6+)
  sources:
    - repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
      targetRevision: HEAD
      path: postgres

    - repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
      targetRevision: HEAD
      path: mongo

    - repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
      targetRevision: HEAD
      path: redis

    - repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
      targetRevision: HEAD
      path: rabbitmq

    - repoURL: "https://github.com/Andersonfrfilho/domestic-kubernets"
      targetRevision: HEAD
      path: minio

  destination:
    server: https://kubernetes.default.svc
    namespace: domestic

  syncPolicy:
    automated:
      prune: true      # remove recursos que foram deletados do git
      selfHeal: false   # reaplica se alguém editar manualmente no cluster
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
