# ArgoCD Application — Observabilidade (opcional)
# Gerencia: Prometheus, Grafana, Loki, Jaeger
#
# Sync wave 4: sobe por último, não é crítico para a stack principal.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: domestic-observability
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: domestic
  annotations:
    argocd.argoproj.io/sync-wave: "4"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: domestic

  sources:
    - repoURL: "CHANGE_ME_GIT_REPO_URL"
      targetRevision: HEAD
      path: observability/prometheus

    - repoURL: "CHANGE_ME_GIT_REPO_URL"
      targetRevision: HEAD
      path: observability/grafana

    - repoURL: "CHANGE_ME_GIT_REPO_URL"
      targetRevision: HEAD
      path: observability/loki

    - repoURL: "CHANGE_ME_GIT_REPO_URL"
      targetRevision: HEAD
      path: observability/jaeger

  destination:
    server: https://kubernetes.default.svc
    namespace: domestic

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 2m
