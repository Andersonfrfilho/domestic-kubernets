apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  url: http://argocd.domestic.local
  # Intervalo de reconciliation. Sem webhooks (home lab), o ArgoCD
  # usa polling. Combinado com reposerver.default.cache.expiration: 1m,
  # novos commits são detectados em até ~2 minutos após o push.
  timeout.reconciliation: 60s
  oidc.config: |
    name: Keycloak
    issuer: http://keycloak.domestic.local/realms/domestic
    clientID: argocd
    clientSecret: argocd-client-secret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
    requestedIDTokenClaims:
      groups:
        essential: true
