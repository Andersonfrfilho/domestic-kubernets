# Preencha antes de aplicar:
#   COOKIE_SECRET: exatamente 32 caracteres aleatórios
#     python3 -c "import secrets; print(secrets.token_hex(16))"
#   CLIENT_SECRET: "kong-manager-client-secret" (valor definido no realm do Keycloak)
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-kong-manager-secret
  namespace: domestic
  labels:
    app: oauth2-proxy-kong-manager
type: Opaque
stringData:
  OAUTH2_PROXY_CLIENT_SECRET: CHANGE_ME
  OAUTH2_PROXY_COOKIE_SECRET: CHANGE_ME_32_CHARS
