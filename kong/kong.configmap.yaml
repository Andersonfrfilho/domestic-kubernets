apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-env-config
  namespace: domestic
  labels:
    app: kong
data:
  KONG_DATABASE: "off"
  KONG_DECLARATIVE_CONFIG: "/kong/declarative/kong.yml"
  KONG_PROXY_ACCESS_LOG: "/dev/stdout"
  KONG_ADMIN_ACCESS_LOG: "/dev/stdout"
  KONG_PROXY_ERROR_LOG: "/dev/stderr"
  KONG_ADMIN_ERROR_LOG: "/dev/stderr"
  KONG_ADMIN_LISTEN: "0.0.0.0:8001"
  KONG_PROXY_LISTEN: "0.0.0.0:8000"
# NOTE: The kong.yml declarative config is mounted from a separate ConfigMap.
# Create it before applying:
#   kubectl create configmap kong-declarative-config \
#     --from-file=kong.yml=./kong/kong.yml -n domestic
