apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: domestic
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      initContainers:
        - name: wait-for-postgres-keycloak
          image: busybox:1.36
          command: [sh, -c, "until nc -z postgres-keycloak 5432; do echo waiting for postgres-keycloak; sleep 2; done"]
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:25.0
          # start-dev: dev mode (no production hardening). --import-realm: import JSON from /opt/keycloak/data/import.
          args: ["start-dev", "--import-realm"]
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 9000
              name: management
          env:
            - name: KEYCLOAK_ADMIN
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KEYCLOAK_ADMIN_PASSWORD
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_USERNAME
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-secret
                  key: KC_DB_PASSWORD
          envFrom:
            - configMapRef:
                name: keycloak-config
          volumeMounts:
            - name: realm-import
              mountPath: /opt/keycloak/data/import
              readOnly: true
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "600Mi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /realms/master
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 5
            timeoutSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 5
            timeoutSeconds: 5
      volumes:
        # Created via: kubectl create configmap keycloak-realm-config \
        #   --from-file=domestic-realm.json=./keycloak-config/domestic-realm.json \
        #   -n domestic
        - name: realm-import
          configMap:
            name: keycloak-realm-config
