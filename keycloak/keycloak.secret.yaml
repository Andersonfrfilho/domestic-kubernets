apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  namespace: domestic
  labels:
    app: keycloak
type: Opaque
# IMPORTANT: Replace placeholder values before applying.
# KEYCLOAK_DB_USER/PASS must match postgres-keycloak-secret values.
stringData:
  KEYCLOAK_ADMIN: "domestic"
  KEYCLOAK_ADMIN_PASSWORD: "admin"
  KC_DB_USERNAME: "domestic"
  KC_DB_PASSWORD: "keycloak"
