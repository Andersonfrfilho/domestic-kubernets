apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: domestic
  labels:
    app: postgres
spec:
  selector:
    app: postgres
  # ClusterIP: internal access only. Use postgres.domestic.svc.cluster.local or just "postgres".
  type: ClusterIP
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
---
# Read replica service — points to same pod for local dev.
# In production with CloudNativePG, this service routes to replica pods only.
apiVersion: v1
kind: Service
metadata:
  name: postgres-ro
  namespace: domestic
  labels:
    app: postgres
    role: read
spec:
  selector:
    app: postgres
  type: LoadBalancer
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
